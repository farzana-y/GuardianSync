<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; }
        table { border-collapse: collapse; width: 100%; cursor: pointer; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background-color: #f2f2f2; }
        .critical { background-color: #ff4d4d; color: white; }

        /* Modal Styling */
        #incidentModal {
            display: none;
            position: fixed;
            top: 10%;
            left: 20%;
            width: 60%;
            background: white;
            padding: 20px;
            border: 2px solid black;
            box-shadow: 0px 0px 15px gray;
            z-index: 1000;
        }

        #incidentModal button {
            margin-top: 10px;
        }
        /* Color coding for the entire row */
.row-reported { background-color: #d1ecf1; color: #0c5460; } /* Blueish */
.row-escalated { background-color: #f8d7da; color: #721c24; } /* Reddish */
.row-in-progress { background-color: #fff3cd; color: #856404; } /* Yellowish */
.row-resolved { background-color: #d4edda; color: #155724; } /* Greenish */

/* Critical overrides for severity */
.severity-critical { 
    background-color: #ff0000 !important; 
    color: white !important; 
    font-weight: bold; 
    animation: blinker 1.5s linear infinite; 
}

@keyframes blinker {
    50% { opacity: 0.7; }
}
    </style>
</head>
<body>

<h2>Emergency Admin Dashboard</h2>

<table id="incidentTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Category</th>
            <th>Severity</th>
            <th>Location</th>
            <th>Distress</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- Modal -->
<div id="incidentModal">
    <h3>Incident Details</h3>
    <div id="modalContent"></div>
    <button onclick="closeModal()">Close</button>
</div>

<audio id="alertSound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

<script>
let knownCriticalIds = new Set();

async function fetchIncidents() {
    try {
        const response = await fetch('/admin/incidents');
        const data = await response.json();
        renderTable(data); // Use the color-coding function
    } catch (err) {
        console.error("Failed to fetch incidents:", err);
    }
}

function renderTable(incidents) {
    const tbody = document.querySelector("#incidentTable tbody");
    tbody.innerHTML = "";

    incidents.forEach(incident => {
        const row = document.createElement("tr");
        
        let statusClass = "";
        const status = incident.lifecycle_status?.toUpperCase();
        const severity = incident.severity?.toUpperCase();

        // 1. HIGHEST PRIORITY: If it is resolved, it MUST be green
        if (status === "RESOLVED") {
            statusClass = "row-resolved";
        } 
        // 2. SECOND PRIORITY: If not resolved, check if it's Critical (Red/Blink)
        else if (severity === "CRITICAL") {
            statusClass = "severity-critical";
            
            if (!knownCriticalIds.has(incident.id)) {
                document.getElementById("alertSound").play().catch(()=>{});
                knownCriticalIds.add(incident.id);
            }
        }
        // 3. OTHER STATUSES: Fallback colors
        else if (status === "REPORTED") statusClass = "row-reported";
        else if (status === "ESCALATED") statusClass = "row-escalated";
        else if (status === "IN_PROGRESS") statusClass = "row-in-progress";

        row.className = statusClass;
        row.onclick = () => showIncidentDetails(incident);

        row.innerHTML = `
            <td>${incident.id.substring(0, 8)}...</td>
            <td>${incident.user_id.substring(0, 8)}...</td>
            <td>${incident.category}</td>
            <td>${incident.severity}</td>
            <td>${incident.location || "N/A"}</td>
            <td>${incident.distress_level || 0}/10</td>
            <td><strong>${incident.lifecycle_status}</strong></td>
            <td>${new Date(incident.created_at).toLocaleString()}</td>
        `;
        tbody.appendChild(row);
    });
}



// Modal Functions
function showIncidentDetails(incident) {
    const modal = document.getElementById("incidentModal");
    const content = document.getElementById("modalContent");

    content.innerHTML = `
        <div style="line-height: 1.6;">
            <p><strong>ID:</strong> ${incident.id}</p>
            <p><strong>Category:</strong> ${incident.category} | <strong>Severity:</strong> ${incident.severity}</p>
            <p><strong>Status:</strong> <span style="text-decoration: underline;">${incident.lifecycle_status}</span></p>
            <hr>
            <p><strong>User Transcript:</strong><br><em>"${incident.transcript || "No transcript available"}"</em></p>
            <p><strong>AI Emergency Guidance:</strong><br>${incident.ai_response || "Waiting for AI..."}</p>
            <hr>
            <button onclick="updateStatus('${incident.id}', 'IN_PROGRESS')" style="background-color: #ffc107;">Dispatch / In Progress</button>
            <button onclick="updateStatus('${incident.id}', 'RESOLVED')" style="background-color: #28a745; color: white;">Mark Resolved</button>
        </div>
    `;
    modal.style.display = "block";
}

async function updateStatus(id, status) {
    await fetch(`/admin/incidents/${id}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lifecycle_status: status })
    });
    closeModal();
    fetchIncidents(); // Refresh immediately after update
}

function closeModal() {
    document.getElementById("incidentModal").style.display = "none";
}

// Sound permission fix
document.body.addEventListener("click", function enableSound() {
    const audio = document.getElementById("alertSound");
    audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(()=>{});
    document.body.removeEventListener("click", enableSound);
});

// Start the dashboard
fetchIncidents();
setInterval(fetchIncidents, 5000);
</script>
</script>


</body>
</html>
